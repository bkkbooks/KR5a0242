front:
  text: 二篇同卷稱四
  hash: sha256:5b3ea91375e7c4eb16f687638a4d817aa6e893dabd2c71968c6fca5c68da1ebe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0242_HFL_000-001a, image: hfl/0114/0114-102.png}
body:
  text: 碧虛子親傳直指紙舟先生全真直指碧虛子親傳直指僕自幼學道弱冠棄家遍歷江湖求參道德誦祖師張紫陽以來諸先生丹經詞曲傳記熟研精思尋文求義又遍參道契髙士窮歷大道之要後遊諸名山大川洞府福地禱求石壁碑記晚過海瓊先生授以大道之要又遇安然居士於朱陵洞天作諸章以相貽始得海瓊之妙㫖也乃知少年之學所求所聞所見俱為屋下架屋枝上接技殊不知屋便是屋枝便是枝此事只在眼前何必遠求今授于子子可因文解意猛省用功不必狐疑道在其中矣夫至道不可以名言至神不可以想得可名非道可想非神夫神稟乎道合乎性根於陽虛靈而無跡變現而無方超乎天地之外天地不可得而囿出乎古今之數古今不可得而窮可謂真而至真玄之又玄凡男子四大一身皆屬隂惟先天一氣是陽此氣非呼吸吹噓之氣亦無形影可見古云見之不可用用之不可見此氣未受形之先在胎中先受此氣後生兩腎兩目由此生心肝脾肺九竅四肢次第而成人象具足此氣正在空虛之間名玄牝之門先師玄牝歌自可詳見今世人宰豬羊見兩腎之間腰膂去處有一空膜之中有氣呼肢彭亨直至肉冷方息者是也此氣生則氣血全盛魂魄相為內含五彩暖氣如湯如人死氣血一散而此竅餒矣此氣便是金丹大藥故師云以心肝脾肺腎腸膽精津涕唾氣血液為非道可以精神魂魄意似是而實非者也人之一身左足太陽右足太隂兩足底為湧泉發水火二氣自兩足入尾閭上合於兩腎左為腎堂右為精府一水一火一龜一蛇互相橐籥兩腎之間空虛一竅名曰玄牝二腎之氣貫通玄牝氣之由此發黃赤二道上夾脊雙關貫二十四椎中通心腹入膏肓會乎風府上朝泥丸由泥丸而下明堂散灌五宮下重樓復流入于本宮日夜循環周流不息皆是自然而然即不是動手腳做來底然而今人皆流入旁門者不知虛無自然默默運用之理却妄行屈伸呵噓摩擦引導存思注想遂生妄想妄作反致成疾如白遵道人箇箇黃瘦運氣道人人人蠱疾此皆驗也夫氣在人身人人一般而無多少有涵養底做得成無涵養底做不成其流行往來出入自有定數有如潮候弦朔必應天上斗礿子午自移又如女子月經人病瘧疾應時而至確然無差此氣遇陽時為陽火遇隂時為隂水火即木液水即金精左腎為坎坎中有戊右腎為離離中有巳戊巳二土合成曰圭又名水中金金者曰刀故號刀圭也火即木水即金為金木無間水火同鄉其金木水火即是一土而一土總其五行師云五臟無氣六腑無精正謂此耳此氣時時運轉自然不假人為凡言轆轤三車黃河曹溪者取象如此非以人力能為常以子時而至為陽火午時而至為隂符以卯時而至為木液以酉時而至為金精卯中有甲酉中有庚故須採取用甲庚子中有戊午中有已故取真土用子午其實一物取採則用甲庚行火則不拘于午非自然洞曉乾坤升降隂腸盛衰藥材者嫩水火潜飛之理者不足以語此然而師傳言之甚詳而後人自惑言之甚簡而後人自疑何也皆緣泥於虛無則不知下手用功是胎息不成而歸於頑空忽於自然則泥於妄想強作是以心神枉費而反以致疾夫虛無者言其不可見聞自然者言其可以迎取今以採取火候等法逐節緊切相傳但謹守奉行自驗訣曰凡人未入定巳前且理㑹安排採取藥材每日每夜且習打坐一定自然骨節開關脉通自膀胱至夾脊便如車輪勤先天一氣自然由三關朝泥丸下重樓入絳宮然其來有時採亦有時須得卯酉一旺時默默端坐不須用力摩動須㬰覺頂熱喉中有甘露時時滴下便以目內視以意內送直納之綘宮而止凡一日內以甲應上弦自子至卯為上弦得汞半斤自午至酉為下弦得鉛半斤採甲汞庚鉛各半斤自然定數所謂鉛見癸生須急採者甲庚二時木汞金鉛方生須是此時時採取也如此謂之採取然於採取之時不記年月久久積之方成爐鼎夫一身爐也今人以脾為黃庭頂中泥丸為鼎也爐鼎既成然後種藥夫藥物一生且採且鍊採而種之為藥鍊而成之為火採之則一日有一銖之得鍊之則一日有一斤之數採藥之時須揀甲庚旺氣行火之法則忌沐浴有此不同採之法亦如安鼎不過因自然而來而迎之以意送之以目故丹經云黃婆青衣黃婆者意也青衣者目也以意逢迎謂之黃婆媒合以目內送謂之青衣女傳言人身之氣意行則行意止則止不復不流謂之種藥即入鼎中然後有火候古人云聖人傳藥不傳火非不傳也以火與藥同歸而殊途同情而異功故子為一陽至巳為六陽言自子至巳火歸六數而六成乾當自子至巳以意送之謂之進火又謂之曰添午為隂至亥為六隂自午至亥水歸六數而六成坤當自午至亥不必迎之謂之退火又謂之曰抽而言火不言水者蓋添進則為火抽退則為水此自然而然不假人為故不言之水也丹經言河圖洛書之數者言其火候自然與此卦生成之數合耳非必求用力以此數言朝屯暮蒙晝姤夜復一言與此卦默合非以用力求合於卦也如運之說則言此氣運行流灌五臟百脉如亥子旺腎寅卯旺肝巳午旺心申酉旺肺辰戊丑未旺脾自然而此氣運行由旺宮而出初不必妄想此時此臟有此氣出入流運然採取造鼎之初則無禁忌時為即為即了即休至如入葬行火則須擇日入室一亳俗事不可妄干使耳目口鼻四象相忘畫夜如一毫髮無間胸中廓然虛室生白一有所著便是卦圖不牢藥物走漏既在空中不可求睡當姑終不寐蓋不寐為陽合寐為隂并每要惺惺然常提著捐去喜怒蓋怒則腸散喜則隂乘若有毫髮之隂而腸神間錙銖之隂而皆鬼也食須半饑半飽勿茹葷肥五味但和淡溫熟者為佳必須率性依時合氣當以玄虛為城恬淡為域太和為室寂然為日月去其妄心存其真心見藥即採遇火即行一年之內止除卯酉兩月不可行火候以卯木旺則火炎金旺則水盛故耳除此兩月不須行火候行則反傷一年十二月去其卯酉為沐浴止存十箇月故曰胎成則純腸俱備不須行火候行則傷丹當移入泥丸謂之撫鼎此時胎仙巳成如人巳生但須乳哺也工夫至此只須溫養不必再行火候沐浴如此三年九載則天門自開嬰兒出入往來無礙位登五矣故撫鼎者即乳哺也此首尾用工之說皆是自然而然者不假人力强為妄想不過及時以意逢迎而巳須是積日纍月造鼎安爐一年十月結胎行火而師云一粒金丹赫日紅何也宮一時半日之功夫可奪一年半紀之造化也當其藥生火到之時不過頃刻逢迎故謂頃刻而成然金丹即非終日終夜勞神苦志强為妄想可成者夫藥物爐鼎火候沐浴胎息嬰兒運用抽添賔主刑德浮沉升降鉛汞水火真土刀圭金精木液一應名號都是改名換字其物即一也鈎鎖連環經自可熟讀言之非難行之為難守之朂難大抵旁門小法俱無報應唯有金丹一件便有應驗凡人採藥少年須行半年功夫中年須行一年功夫老年須行三年功夫絶欲忘念靜坐默然採取之後時節至來耳目聰明手足清健百病俱無自然兩腎氣來夾脊如車輪泥丸如腸注口常有甘露滴滴而來神苦不寐百念俱絶不過兩月餘日月生神先此心明了不可便為至道否則狂念妄生遂成癡風至於三月行火之餘時時刻刻工夫不差則七竅光眀所有金輪內外洞明遠接鬼神當此之時嬰兒遂生形像不可便縱其運動出入須要著緊守護牢固否則火漏丹敗十月火滿受氣足備自然如此瓜熟蒂懸而出然後出入往來可以離身丈尺亦不可遠去一出便須收回否則一去而迷遂至投胎奪舍不復回顧直須三年九載日子滿足骨骼老如人數歲方知人事輕重淺深方可縱其自然出入往來至此時則飛升變化真仙之位矣然猶有魔障當其入室坐忘之時神異自出凡天下萬品竒怪之事俱集于前真如慧眼初見猶如神眀依附到此勿喜勿驚此皆魔障所至不可便以為道要在把捉攝機靜念凝一守持所謂太玄之一守其真形切不可以妄為真蹤情為性如此守一其魔自消方能道成今人多到此時無定力定見故為外邪所攝則不能來反有風狂癡顛非橫之禍遂使後人反以神仙之道虛無渺蕩惜哉若十月胎成移鼎溫養之後又當求向上一著此事在悟真為下卷求精進法自然有希有之遇此不待傳授之訣若飛升尸解乃是丹成之後又下功夫立大功德隨修行深淺之果證即非傳授口訣凡欲修此丹法必須次第而行倘或不依次第妄作僣行則身中無胎嬰兒不生妄參禪學如水之無源木之無根竟成頑空到老無成終歸輪回之趣入室六十日之後便見驗也須是依訣行之切不可間斷子轉斗移氣澄境靜攝機作用綿綿不絶或倦則上池回溉一任消息往來雲霧遍興無迷無妄靈光發現勿喜勿驚但兩手捲珠簾而巳須要專戒萬緣喜怒思憂飢渴寒燠寢寐無入昏沉心至常眀渴則少飮四君子湯白术湯才睡氣便化血不能上騰不寐惺惺則陽氣上騰矣凡世人兩目係肝來養者蓋心司神也所以神仙眼碧色奪目也凡人修道者不可熟睡睡則隂氣盛化血入肝不能上滋兩目自然通靈僕痛念世人談遭者一二幾欲付人奈針芥不相投未容分付今偶與子㑹意味稍合若非前生有些種子豈能知其一二僕今盡其所授逐節切緊一一録付子可熟玩靜思尋文求義候其時來用工下手斷斷成就僕與子四紀復有會期之所未可輕泄了宜勉之僕口囑之言在心勿夫筆録之語常可熟誦每開卷時如見諸師君在上不可忽之如身未行且當澄心靜念守其機緣下手切不可妄授非徒倘可言者粗發眀其一二無妨得人則不可祕違此則戾禍大焉碧虛子親傳直指
